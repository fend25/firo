name: Publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'
      - name: Verify version consistency
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          PKG=$(node -p "require('./package.json').version")
          JSR=$(node -p "require('./jsr.json').version")
          echo "tag=$TAG package.json=$PKG jsr.json=$JSR"
          if [ "$TAG" != "$PKG" ] || [ "$TAG" != "$JSR" ]; then
            echo "::error::Version mismatch! tag=v$TAG package.json=$PKG jsr.json=$JSR"
            exit 1
          fi
      - run: pnpm install
      - run: pnpm check
      - run: pnpm build
      - name: Dry run — npm
        run: pnpm publish --dry-run --no-git-checks
      - name: Dry run — JSR
        run: npx jsr publish --dry-run
      - name: Publish to npm
        run: pnpm publish --provenance --access public --no-git-checks
      - name: Publish to JSR
        run: npx jsr publish
